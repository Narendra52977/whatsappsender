<!DOCTYPE html>
<html>
<head>
<title>WhatsApp Sender</title>
<style>
body{
  font-family: Arial;
  padding:20px;
}
textarea{
  width:100%;
  height:120px;
}
button{
  padding:10px 20px;
  margin-top:10px;
  margin-right:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>WhatsApp Sender Tool</h2>

<p>Paste phone numbers (one per line):</p>
<textarea id="numbers"></textarea>

<p>Message:</p>
<textarea id="message">
Hi mam good evening,
I am Saraswathi.

Please visit my shop.

Shop location:
https://maps.google.com/?q=17.3850,78.4867
</textarea>

<br>

<button onclick="start()">Start</button>
<button onclick="next()">Next</button>

<script>

let list = []
let index = 0

function start(){
  const raw = document.getElementById("numbers").value
  list = raw.split("\n").map(n => n.trim()).filter(n => n.length>0)
  index = 0
  next()
}

function next(){

  if(index >= list.length){
    alert("Finished all numbers")
    return
  }

  let number = list[index]
  let message = encodeURIComponent(document.getElementById("message").value)

  window.open(`https://wa.me/91${number}?text=${message}`)

  index++

}

</script>

</body>
</html>
